<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>mulitples</title>
    <meta name="description" content="Découvrez le projet Multiples: création d'un coffret et de cinq carnets.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cutive+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" type="image/png" href="favicon.png?v=3">
    <meta property="og:title" content="andréa lefert - portfolio">
    <meta property="og:description" content="MULTIPLES - Andréa lefert, Graphiste-façonneur en design éditorial.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://andrealefert.netlify.app/images/coffret.jpg">
</head>

<body>

    <nav class="corner-text top-left">
        <a href="index.html" onclick="history.back(); return false;">← retour</a>
    </nav>
    <div class="corner-text top-center">portfolio</div>

    <header class="project-header">
        <h1>multiples</h1>
        <p><strong>2025</strong></p>
        <p>Création d'un coffret et de cinq carnets. Chaque carnet <br class="saut-ordi"> contient une série de dessins ou collages.</p>
        <p>Format: 10,5x15cm</p>
    </header>

    <main class="grille-container grille-projet">
        
        <div class="tuile-projet">
            <img src="images/coffret1.jpg" alt="coffret" class="image-cliquable">
        </div>

        <div class="tuile-projet">
            <video src="videos/gifcarnet1.mp4" class="video-au-survol" loop muted playsinline alt="Carnet 1 animé"></video>
            <div class="indicateur-play">▶</div>
        </div>
        
        <div class="tuile-projet">
            <video src="videos/gifcarnet2.mp4" class="video-au-survol" loop muted playsinline alt="Carnet 1 animé"></video>
            <div class="indicateur-play">▶</div>
        </div>

        <div class="tuile-projet">
            <video src="videos/gifcarnet3.mp4" class="video-au-survol" loop muted playsinline alt="Carnet 1 animé"></video>
            <div class="indicateur-play">▶</div>
        </div>

        <div class="tuile-projet">
            <video src="videos/gifcarnet4.mp4" class="video-au-survol" loop muted playsinline alt="Carnet 1 animé"></video>
            <div class="indicateur-play">▶</div>
        </div>

        <div class="tuile-projet">
            <video src="videos/gifcarnet5.mp4" class="video-au-survol" loop muted playsinline alt="Carnet 1 animé"></video>
            <div class="indicateur-play">▶</div>
        </div>
    </main>

<div id="lightbox" class="lightbox">
    <span class="croix-fermer">&times;</span>
    <img id="lightbox-img" class="lightbox-img" src="" alt="Image en grand">
</div>

<script>
   const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const images = document.querySelectorAll('.image-cliquable');
    
    // 1. Quand on clique sur une image, on l'affiche en grand
    images.forEach(img => {
        img.addEventListener('click', function() {
            lightbox.style.display = 'flex'; 
            lightboxImg.src = this.src;      
        });
    });

    // 2. Quand on clique sur le calque (ou la croix), on ferme
    lightbox.addEventListener('click', function(e) {
        if (e.target === lightbox || e.target.classList.contains('croix-fermer')) {
            lightbox.style.display = 'none';
        }
    });

    // --- EFFET VIDÉO AU SURVOL (ORDI) / AUTO (MOBILE) ---
    const videosSurvol = document.querySelectorAll('.video-au-survol');
    
    // On vérifie si on est sur un écran de type mobile/tablette
    const estSurMobile = window.matchMedia("(max-width: 900px)").matches;
    
    videosSurvol.forEach(video => {
        if (estSurMobile) {
            // SUR TÉLÉPHONE : On force la lecture automatique
            video.setAttribute('autoplay', 'true');
            video.play();
        } else {
            // SUR ORDINATEUR : Lecture au survol uniquement
            video.addEventListener('mouseenter', function() {
                this.play();
            });
    
            video.addEventListener('mouseleave', function() {
                this.pause();
            });
        }
    });

    /* =======================================================
       AMÉLIORATIONS DE LA LIGHTBOX (Clic et Clavier)
       ======================================================= */
    
    const imageLightbox = document.querySelector('.lightbox-img');
    const conteneurLightbox = document.querySelector('.lightbox');
    
    if (imageLightbox) {
        imageLightbox.addEventListener('click', () => {
            conteneurLightbox.style.display = 'none';
        });
    }
    
    document.addEventListener('keydown', (event) => {
        const estOuverte = window.getComputedStyle(conteneurLightbox).display !== 'none';
        
        if (estOuverte) {
            if (event.key === 'ArrowRight') {
                const flecheDroite = document.querySelector('.fleche-droite');
                if (flecheDroite) flecheDroite.click();
            }
            else if (event.key === 'ArrowLeft') {
                const flecheGauche = document.querySelector('.fleche-gauche');
                if (flecheGauche) flecheGauche.click();
            }
            else if (event.key === 'Escape') {
                conteneurLightbox.style.display = 'none';
            }
        }
    });
    document.addEventListener("DOMContentLoaded", function() {
    // 1. On liste tous les endroits où on veut appliquer la règle (tes paragraphes, titres, textes de coins, etc.)
    const elementsTextes = document.querySelectorAll("p, h1, h2, h3, .sous-titre-projet, .texte-categorie, .texte-profil, .corner-text, .project-header");

    // 2. On applique la magie à chaque élément trouvé
    elementsTextes.forEach(function(element) {
        if (element.innerHTML) {
            // L'expression régulière (RegEx) qui cherche les mots de 1 ou 2 lettres (accents inclus) suivis d'un espace
            // et remplace cet espace par un '&nbsp;' (espace insécable)
            element.innerHTML = element.innerHTML.replace(/(?<=\s|^|>)([a-zA-ZÀ-ÿ]{1,3})\s+/g, '$1&nbsp;');
        }
    });
});
    </script>
</body>
</html>
